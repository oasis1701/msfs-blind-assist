<!-- EFB alert card whose message contains a DECIMAL value (e.g. a fuel/weight figure). The
     sentence-boundary space re-insertion must add a space after .!? before a CAPITAL letter only —
     never split a number like "12.5" into "12. 5". data-rect = "top,left,right,bottom". -->
<div data-vis="1" data-rect="0,0,800,600">
  <div id="alert_card" class="row" data-vis="1" data-rect="0,0,400,200">
    <p id="alert_card_heading" data-vis="1" data-rect="0,0,400,30">Notice</p>
    <p id="alert_card_message" data-vis="1" data-rect="40,0,400,80">Fuel set to 12.5 tonnes.Confirm before departure.</p>
    <button id="alert_card_button" class="btn btn-primary" data-vis="1" data-rect="100,0,200,140">OK</button>
  </div>
</div>
