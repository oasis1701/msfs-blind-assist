<div data-vis="1" data-rect="0,0,2048,1500">
  <button data-vis="1" data-rect="0,0,120,40"><i class="fa-solid fa-sliders"></i></button>
  <div class="row" data-vis="1" data-rect="100,100,900,140">
    <label class="opt-label" data-vis="1" data-rect="100,100,300,140">Airport ICAO</label>
    <input id="opt_takeoff_airport" type="text" value="KSEA" data-vis="1" data-rect="100,320,700,140">
  </div>
  <div class="row" data-vis="1" data-rect="160,100,900,200">

      <div class="selected-option" data-vis="1" data-rect="160,320,700,200">Dry</div>
      <div class="options" data-vis="0">
        <div class="option" data-value="Dry">Dry</div>
        <div class="option" data-value="Wet">Wet</div>
      </div>
    </div>
  </div>
  <div class="row" data-vis="1" data-rect="220,100,900,260">
    <label class="opt-label" data-vis="1" data-rect="220,100,300,260">Elevation</label>
    <input id="opt_takeoff_elevation" type="text" value="" data-vis="1" data-rect="220,320,600,260">
    <span class="input-unit" data-vis="1" data-rect="220,620,700,260">ft</span>
  </div>
</div>
